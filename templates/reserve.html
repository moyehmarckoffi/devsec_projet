{% extends "base.html" %}

{% block content %}

<div class="card">
<h2>Réserver une voiture</h2>

<form method="POST" action="/add">

    <input type="date" name="date"><br><br>
    <button type="submit">Réserver</button>
</form>

</div>

{% endblock %}
